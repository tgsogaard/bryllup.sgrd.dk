<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryllup ♥</title>
    <style>
        body {
            font-family: 'Cursive', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 90vh;
            margin: 0 10px 0 10px;
            background-color: #fdf8f5;
        }
        hr {
            border: 0;
            height: 2px;
            background-color: #4a4a4a;
            width: 25rem;
            opacity: 30%
        }
        h1, h2, h3, h4, h5 {
            margin: 0;
            font-family: 'Dancing Script', cursive;
            font-weight: normal;
            text-align: center;
            color: #4a4a4a;
        }
        h1 {
            margin-top: -1rem;
            font-size: 7rem;
        }
        h2 {
            font-size: 2rem;
        }
        h3 {
            font-size: 1.5rem;
        }
        .heart-icon {
            max-width: 10rem;
            opacity: 30%;
            transform: rotate(15deg);
            transition: transform 0.3s ease;
        }
        .heart-icon:hover {
            transform: rotate(-5deg);
        }
        .box {
            border: 2px solid #c7c4c2;
            padding: 20px;
            margin-top: 10px;
            border-radius: 10px;
            background-color: #f0efed;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <img class=heart-icon src="../resources/heart.png" class="heart-icon">
  <br>
  <br>
  <h3>Save the date!</h3>
  <h1>Bryllup</h1>
  <br>
  <hr>
  <br>
  <h2 class=tc>Christina & Thomas skal giftes!</h2>
  <h2>💍🩷🎉🥂</h2>
  <br>
  <div class="box">
    <h3>Lørdag d. 21. juni 2025</h3>
    <h3>Kl. 11.00</h3>
    <h3>Dronningborg Kirke</h3>
  </div>
</body>
</html>
